# Landslide Assessment Configuration File
# AI-Powered Landslide Assessment using Multi-Temporal InSAR and LLMs

server:
  host: "127.0.0.1"
  port: 8000
  debug: true
  api_prefix: "/api"

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path: "logs/app.log"

paths:
  data_dir: "data"
  json_dir: "data/json"
  csv_dir: "data/csv"
  predictions_dir: "data/predictions"
  heatmaps_dir: "data/heatmaps"
  overlays_dir: "data/overlays"
  reports_dir: "data/reports"
  pdf_dir: "data/pdf_reports"
  temp_dir: "data/temp"

models:
  segformer_path: "models/segformer_best.pth"

llm:
  # Supported: "mock", "transformers", "ollama", "vllm"
  provider: "mock"
  
  # Local HuggingFace / Transformers Model parameters
  model_name: "Qwen/Qwen2.5-3B-Instruct"
  device: "cpu" # "cuda" or "cpu"
  torch_dtype: "float16" # "float16", "bfloat16", "float32"
  
  # Ollama parameters
  ollama_url: "http://localhost:11434"
  ollama_model: "qwen2.5:3b"
  
  # vLLM parameters
  vllm_url: "http://localhost:8000/v1"
  vllm_model: "qwen2.5-3b-instruct"
  
  # Generation parameters
  temperature: 0.2
  top_p: 0.9
  top_k: 50
  max_tokens: 2048
  streaming: true

evaluation:
  reference_reports_dir: "evaluation/references"
  results_output_dir: "evaluation/results"

app_mode: "development"

vlm:
  provider: "mock"
  model_name: "Qwen/Qwen2.5-VL-7B-Instruct"
  qwen_model_name: "Qwen/Qwen2.5-VL-7B-Instruct"
  gemma_model_name: "google/paligemma-3b-pt-448"
  llama_model_name: "meta-llama/Llama-3.2-11B-Vision-Instruct"
  device: "cpu"
  cache_rgb_images: false
  dataset_base_dir: null
